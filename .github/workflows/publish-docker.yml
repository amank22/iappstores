name: Publish Docker image

on:
  workflow_run:
    workflows:
      - Verify
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SITE_URL: https://iappstores.com
  COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
  COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SITE_URL=${{ env.SITE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.SITE_URL }}

      - name: Trigger Coolify deployment
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' && env.COOLIFY_API_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --location \
            --request GET "${COOLIFY_WEBHOOK_URL}" \
            --header "Authorization: Bearer ${COOLIFY_API_TOKEN}"

      - name: Skip Coolify deployment
        if: ${{ env.COOLIFY_WEBHOOK_URL == '' || env.COOLIFY_API_TOKEN == '' }}
        run: echo "Skipping Coolify deployment because COOLIFY_WEBHOOK_URL or COOLIFY_API_TOKEN is not configured."
